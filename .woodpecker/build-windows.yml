when:
  - event: tag
    ref: "refs/tags/v*"

depends_on:
  - check

labels:
  platform: windows/amd64

skip_clone: true

steps:
  - name: build
    image: powershell
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git init
      - git remote add origin $env:CI_REPO_CLONE_URL
      - git fetch --no-tags --depth=1 origin $env:CI_COMMIT_SHA
      - git reset --hard $env:CI_COMMIT_SHA
      - $env:PATH = "$env:USERPROFILE\.cargo\bin;C:\Users\Administrator\.cargo\bin;$env:PATH"
      - rustup default stable
      - cargo build --release -p hpm-cli --bin hpm
      - >-
        $VERSION = $env:CI_COMMIT_TAG -replace '^v','';
        $ARTIFACT = "hpm-v$VERSION-windows-x86_64.exe";
        New-Item -ItemType Directory -Force -Path artifacts;
        Copy-Item target\release\hpm.exe "artifacts\$ARTIFACT";
        $RELEASE_JSON = python3 -c ("import sys,json,re; v='" + $VERSION + "'; tag='" + $env:CI_COMMIT_TAG + "'; lines=open('CHANGELOG.md').read(); m=re.search(r'(?m)^## \[' + re.escape(v) + r'\].*?\n(.*?)(?=^## \[|\Z)', lines, re.DOTALL); body=m.group(1).strip() if m else ''; print(json.dumps({'tag_name':tag,'name':tag,'body':body}) if body else json.dumps({'tag_name':tag,'name':tag,'generate_release_notes':True}))");
        $headers = @{ Authorization = "token $($env:GITHUB_TOKEN)" };
        try { Invoke-RestMethod -Method Post -Uri "https://api.github.com/repos/3db-dk/hpm/releases"
        -Headers ($headers + @{ "Content-Type" = "application/json" })
        -Body $RELEASE_JSON } catch {};
        $release = Invoke-RestMethod -Uri "https://api.github.com/repos/3db-dk/hpm/releases/tags/$($env:CI_COMMIT_TAG)"
        -Headers $headers;
        $uploadUrl = "https://uploads.github.com/repos/3db-dk/hpm/releases/$($release.id)/assets?name=$ARTIFACT";
        curl.exe -sf -X POST $uploadUrl
        -H "Authorization: token $($env:GITHUB_TOKEN)"
        -H "Content-Type: application/octet-stream"
        --data-binary "@artifacts\$ARTIFACT"
