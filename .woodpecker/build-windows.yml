when:
  - event: tag
    ref: "refs/tags/v*"

depends_on:
  - check

labels:
  platform: windows/amd64

skip_clone: true

steps:
  - name: build
    image: powershell
    commands:
      - git init
      - git remote add origin $env:CI_REPO_CLONE_URL
      - git fetch --no-tags --depth=1 origin $env:CI_COMMIT_SHA
      - git reset --hard $env:CI_COMMIT_SHA
      - $env:PATH = "$env:USERPROFILE\.cargo\bin;C:\Users\Administrator\.cargo\bin;$env:PATH"
      - rustup default stable
      - cargo build --release -p hpm-cli --bin hpm

  - name: test
    image: powershell
    commands:
      - $env:PATH = "$env:USERPROFILE\.cargo\bin;C:\Users\Administrator\.cargo\bin;$env:PATH"
      - rustup default stable
      - cargo test --release --workspace

  - name: upload
    image: powershell
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      # -ExecutionPolicy Bypass because an unsigned .ps1 is otherwise blocked
      # under a Restricted policy; the inline commands this replaced were never
      # subject to that.
      - >-
        & powershell.exe -NoProfile -ExecutionPolicy Bypass
        -File .\ci\release-upload.ps1
        -Source target\release\hpm.exe -Suffix windows-x86_64.exe
      # curl.exe and powershell.exe report failure through $LASTEXITCODE, which
      # try/catch does not observe -- that was the original bug. Check it.
      - if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
