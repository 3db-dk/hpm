when:
  - event: tag
    ref: "refs/tags/v*"

depends_on:
  - check

labels:
  platform: windows/amd64

skip_clone: true

steps:
  - name: build
    image: powershell
    environment:
      GITEA_TOKEN:
        from_secret: gitea_token
    commands:
      - git init
      - git remote add origin $env:CI_REPO_CLONE_URL
      - git fetch --no-tags --depth=1 origin $env:CI_COMMIT_SHA
      - git reset --hard $env:CI_COMMIT_SHA
      - $env:PATH = "$env:USERPROFILE\.cargo\bin;C:\Users\Administrator\.cargo\bin;$env:PATH"
      - rustup default stable
      - cargo build --release -p hpm-cli --bin hpm
      - >-
        $VERSION = $env:CI_COMMIT_TAG -replace '^v','';
        $ARTIFACT = "hpm-v$VERSION-windows-x86_64.exe";
        New-Item -ItemType Directory -Force -Path artifacts;
        Copy-Item target\release\hpm.exe "artifacts\$ARTIFACT";
        $headers = @{ Authorization = "token $($env:GITEA_TOKEN)"; "Content-Type" = "application/json" };
        try { Invoke-RestMethod -Method Post -Uri "$($env:CI_FORGE_URL)/api/v1/repos/$($env:CI_REPO)/releases"
        -Headers $headers -Body "{`"tag_name`":`"$($env:CI_COMMIT_TAG)`",`"name`":`"$($env:CI_COMMIT_TAG)`"}" } catch {};
        $release = Invoke-RestMethod -Uri "$($env:CI_FORGE_URL)/api/v1/repos/$($env:CI_REPO)/releases/tags/$($env:CI_COMMIT_TAG)"
        -Headers @{ Authorization = "token $($env:GITEA_TOKEN)" };
        $uploadUrl = "$($env:CI_FORGE_URL)/api/v1/repos/$($env:CI_REPO)/releases/$($release.id)/assets?name=$ARTIFACT";
        curl.exe -sf -X POST $uploadUrl
        -H "Authorization: token $($env:GITEA_TOKEN)"
        -F "attachment=@artifacts\$ARTIFACT"
