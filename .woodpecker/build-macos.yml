when:
  - event: tag
    ref: "refs/tags/v*"

depends_on:
  - check

labels:
  platform: darwin/amd64

skip_clone: true

steps:
  - name: build
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git init
      - git remote add origin ${CI_REPO_CLONE_URL}
      - git fetch --no-tags --depth=1 origin ${CI_COMMIT_SHA}
      - git reset --hard ${CI_COMMIT_SHA}
      - rustup default stable
      - rustup target add aarch64-apple-darwin
      - cargo build --release -p hpm-cli --bin hpm --target x86_64-apple-darwin
      - cargo build --release -p hpm-cli --bin hpm --target aarch64-apple-darwin
      - >-
        VERSION=${CI_COMMIT_TAG#v} &&
        ARTIFACT="hpm-v$VERSION-darwin-universal" &&
        mkdir -p artifacts &&
        lipo -create -output artifacts/$ARTIFACT
        target/x86_64-apple-darwin/release/hpm
        target/aarch64-apple-darwin/release/hpm &&
        curl -sf -X POST "https://api.github.com/repos/3db-dk/hpm/releases"
        -H "Authorization: token $GITHUB_TOKEN"
        -H "Content-Type: application/json"
        -d "{\"tag_name\":\"${CI_COMMIT_TAG}\",\"name\":\"${CI_COMMIT_TAG}\"}" || true &&
        RELEASE_ID=$(curl -sf "https://api.github.com/repos/3db-dk/hpm/releases/tags/${CI_COMMIT_TAG}"
        -H "Authorization: token $GITHUB_TOKEN" | sed 's/{"id":\([0-9]*\).*/\1/') &&
        curl -sf -X POST "https://uploads.github.com/repos/3db-dk/hpm/releases/$RELEASE_ID/assets?name=$ARTIFACT"
        -H "Authorization: token $GITHUB_TOKEN"
        -H "Content-Type: application/octet-stream"
        --data-binary @artifacts/$ARTIFACT
