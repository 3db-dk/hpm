when:
  - event: tag
    ref: "refs/tags/v*"

depends_on:
  - check

labels:
  platform: darwin/amd64

skip_clone: true

steps:
  - name: build
    image: bash
    commands:
      - git init
      - git remote add origin ${CI_REPO_CLONE_URL}
      - git fetch --no-tags --depth=1 origin ${CI_COMMIT_SHA}
      - git reset --hard ${CI_COMMIT_SHA}
      - rustup default stable
      - rustup target add aarch64-apple-darwin
      - cargo build --release -p hpm-cli --bin hpm --target x86_64-apple-darwin
      - cargo build --release -p hpm-cli --bin hpm --target aarch64-apple-darwin

  - name: test
    image: bash
    commands:
      - rustup default stable
      - cargo test --release --workspace --target x86_64-apple-darwin

  - name: upload
    image: bash
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - >-
        lipo -create -output target/hpm-universal
        target/x86_64-apple-darwin/release/hpm
        target/aarch64-apple-darwin/release/hpm
      - bash ci/release-upload.sh target/hpm-universal darwin-universal
