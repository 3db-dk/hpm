name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
        - os: ubuntu-latest
          target: x86_64-unknown-linux-gnu
          asset_name: hpm-linux-amd64
        - os: windows-latest
          target: x86_64-pc-windows-msvc
          asset_name: hpm-windows-amd64.exe
        - os: macos-latest
          target: x86_64-apple-darwin
          asset_name: hpm-macos-amd64
        - os: macos-latest
          target: aarch64-apple-darwin
          asset_name: hpm-macos-arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Build release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Prepare asset (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        cp target/${{ matrix.target }}/release/hpm ${{ matrix.asset_name }}
        strip ${{ matrix.asset_name }}

    - name: Prepare asset (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        cp target/${{ matrix.target }}/release/hpm.exe ${{ matrix.asset_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
