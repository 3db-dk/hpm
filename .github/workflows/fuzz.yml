name: Fuzzing

on:
  pull_request:
    paths:
      - 'crates/**'
  push:
    branches: [main]
  schedule:
    # Run extended fuzzing weekly on Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  fuzz-tests:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-fuzz-${{ hashFiles('**/Cargo.lock') }}

      - name: Run fuzz tests (hpm-package)
        run: |
          cargo +nightly test fuzz_ --release -p hpm-package --ignored -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true

      - name: Run fuzz tests (hpm-resolver)
        run: |
          cargo +nightly test fuzz_ --release -p hpm-resolver --ignored -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true

      - name: Run fuzz tests (hpm-core)
        run: |
          cargo +nightly test fuzz_ --release -p hpm-core --ignored -- --test-threads=1
        timeout-minutes: 10
        continue-on-error: true

  property-tests:
    name: Property Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-proptest-${{ hashFiles('**/Cargo.lock') }}

      - name: Run property tests
        run: cargo test --workspace prop_ -- --test-threads=1
        env:
          PROPTEST_CASES: 1000
