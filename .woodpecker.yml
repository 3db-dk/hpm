when:
  - event: [push, pull_request, tag]

steps:
  # ── Lint & Test ─────────────────────────────────────────────
  - name: check
    image: rust:1-bookworm
    commands:
      - rustup component add clippy rustfmt
      - cargo fmt --check
      - cargo clippy --workspace --all-targets -- -D warnings
      - cargo test --workspace
    when:
      - event: [push, pull_request, tag]

  # ── Build release binaries ─────────────────────────────────
  - name: build-linux
    image: rust:1-bookworm
    depends_on: [check]
    commands:
      - rustup target add x86_64-unknown-linux-gnu
      - cargo build --release --target x86_64-unknown-linux-gnu -p hpm-cli --bin hpm
      - cp target/x86_64-unknown-linux-gnu/release/hpm hpm-linux-x86_64
    when:
      - event: tag
        ref: "refs/tags/v*"

  - name: build-windows
    image: rust:1-bookworm
    depends_on: [check]
    commands:
      - apt-get update && apt-get install -y wget xz-utils
      - wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
      - tar xf zig-linux-x86_64-0.13.0.tar.xz -C /usr/local
      - export PATH="/usr/local/zig-linux-x86_64-0.13.0:$PATH"
      - cargo install cargo-zigbuild
      - rustup target add x86_64-pc-windows-gnu
      - cargo zigbuild --release --target x86_64-pc-windows-gnu -p hpm-cli --bin hpm
      - cp target/x86_64-pc-windows-gnu/release/hpm.exe hpm-windows-x86_64.exe
    when:
      - event: tag
        ref: "refs/tags/v*"

  # ── Upload to GitHub Releases ──────────────────────────────
  - name: upload-github
    image: debian:bookworm-slim
    depends_on: [build-linux, build-windows]
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - apt-get update && apt-get install -y curl
      - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg -o /usr/share/keyrings/githubcli-archive-keyring.gpg
      - echo "deb [arch=amd64 signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" > /etc/apt/sources.list.d/github-cli.list
      - apt-get update && apt-get install -y gh
      - export GH_TOKEN=$${GITHUB_TOKEN}
      - VERSION=$${CI_COMMIT_TAG#v}
      - echo "Creating GitHub Release v$${VERSION}"
      - gh release create "$${CI_COMMIT_TAG}" --repo 3db-dk/hpm --title "v$${VERSION}" --generate-notes hpm-linux-x86_64 hpm-windows-x86_64.exe
    when:
      - event: tag
        ref: "refs/tags/v*"

  # ── Mirror to GitHub (excluding .woodpecker.yml) ───────────
  - name: mirror-github
    image: alpine/git:latest
    environment:
      GITHUB_TOKEN:
        from_secret: github_token
    commands:
      - git clone $${CI_REPO_CLONE_URL} /tmp/mirror
      - cd /tmp/mirror
      - git config user.email "ci@3db.dk"
      - git config user.name "Woodpecker CI"
      - git rm --cached .woodpecker.yml
      - git commit -m "Remove CI config for public mirror"
      - git remote add github https://x-access-token:$${GITHUB_TOKEN}@github.com/3db-dk/hpm.git
      - git push github HEAD:main --force
      - git push github --tags
    when:
      - event: push
        branch: main
